<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>My China Trip</title><style>
:root{--bg:#f7f8fb;--card:#fff;--text:#1f2937;--muted:#6b7280;--line:#e5e7eb;--accent:#1f5eff;--soft:#eef4ff}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(180deg,#eef4ff 0%,#f7f8fb 30%);color:var(--text);padding:22px}
.wrap{max-width:820px;margin:auto}
h1{font-size:28px;margin:0 0 8px}
.sub{color:var(--muted);font-size:14px;margin-bottom:16px}
.nav{display:grid;grid-template-columns:1fr;gap:10px;margin:16px 0}
.nav a{display:block;background:white;border:1px solid var(--line);border-radius:18px;padding:16px;text-decoration:none;color:var(--text);box-shadow:0 8px 22px rgba(31,41,55,.06);font-weight:700}
.card{background:rgba(255,255,255,.92);border:1px solid var(--line);border-radius:20px;padding:16px;margin:12px 0;box-shadow:0 8px 24px rgba(31,41,55,.06)}
h2{font-size:18px;margin:0 0 10px}
.item{padding:8px 0;border-top:1px solid #f1f3f5}.item:first-of-type{border-top:0}
label{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-top:1px solid #f1f3f5;line-height:1.35}
label:first-of-type{border-top:0}
input[type="checkbox"]{width:20px;height:20px;accent-color:var(--accent);flex:0 0 auto}
.done{text-decoration:line-through;color:var(--muted)}
.back{display:inline-block;margin-bottom:12px;color:var(--accent);text-decoration:none;font-weight:700}
.small{font-size:13px;color:var(--muted)}
.progress{height:10px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin:10px 0}.bar{height:100%;width:0;background:var(--accent)}
button{border:0;border-radius:999px;padding:10px 14px;background:var(--accent);color:white;font-weight:700;cursor:pointer}
</style></head>
<body><div class="wrap"><a class="back" href="index.html">← Home</a>
<h1>🩵 My Trip</h1><div class="sub">Personal packing / outfit / bag plan</div>
<div class="progress"><div class="bar" id="bar"></div></div><div class="small" id="count"></div>
<section class="card"><h2>👜 Bag Setup</h2>
<label><input type="checkbox"><span>Airport: เป้ Laptop + Chamoon</span></label>
<label><input type="checkbox"><span>ใส่ Prada Re-Edition 2005 ใน Luggage</span></label>
<label><input type="checkbox"><span>ใส่ YSL Niki ใน Luggage</span></label>
<label><input type="checkbox"><span>ติด Luggage Tag</span></label>
</section>
<section class="card"><h2>👗 Outfit</h2>
<label><input type="checkbox"><span>15: เสื้อชิล + ยีนส์ + ผ้าใบ</span></label>
<label><input type="checkbox"><span>16 Summit: Blazer กรม + เชิ้ตโบว์ + Skort ขาว + ส้นสูงขาว</span></label>
<label><input type="checkbox"><span>17 Summit: Blazer ขาวลายดำ + เสื้อ GstarCAD + Skort ขาว + ส้นสูงขาว</span></label>
<label><input type="checkbox"><span>18: เสื้อสีอ่อน + กางเกงขายาวดำ + ผ้าใบ</span></label>
<label><input type="checkbox"><span>19–23: เสื้อพอดีตัว / Skort / ยีนส์ ตามแพลน</span></label>
</section>
<section class="card"><h2>🧳 Packing</h2>
<label><input type="checkbox"><span>Passport / Wallet / RMB / Cards</span></label>
<label><input type="checkbox"><span>MacBook + Charger + Adapter / Hub</span></label>
<label><input type="checkbox"><span>Power Bank / AirPods / Apple Watch Charger</span></label>
<label><input type="checkbox"><span>Makeup + Skincare</span></label>
<label><input type="checkbox"><span>ยา / พลาสเตอร์ / ผ้าอนามัย</span></label>
<label><input type="checkbox"><span>รองเท้าส้นสูงขาว + รองเท้าผ้าใบ</span></label>
</section>
<script>
const key='myTripChecklist'; const saved=JSON.parse(localStorage.getItem(key)||'{}');
document.querySelectorAll('label').forEach((l,i)=>{let cb=l.querySelector('input'),s=l.querySelector('span'); cb.checked=!!saved[i]; if(cb.checked)s.classList.add('done'); cb.onchange=()=>{saved[i]=cb.checked;localStorage.setItem(key,JSON.stringify(saved));s.classList.toggle('done',cb.checked);update()}});
function update(){let b=[...document.querySelectorAll('input')],c=b.filter(x=>x.checked).length;document.getElementById('bar').style.width=(c/b.length*100)+'%';document.getElementById('count').textContent=`${c}/${b.length} checked`;} update();
</script></div></body></html>
