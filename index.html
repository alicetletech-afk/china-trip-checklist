<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>China Trip Checklist 2026</title>
  <style>
    :root{
      --bg:#f7f8fb; --card:#ffffff; --text:#1f2937; --muted:#6b7280;
      --line:#e5e7eb; --accent:#1f5eff; --soft:#eef4ff;
    }
    *{box-sizing:border-box}
    body{
      margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:linear-gradient(180deg,#eef4ff 0%,#f7f8fb 28%);
      color:var(--text); padding:22px;
    }
    .wrap{max-width:820px;margin:auto}
    header{margin-bottom:18px}
    h1{font-size:28px;margin:0 0 6px}
    .sub{color:var(--muted);font-size:14px}
    .tools{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0}
    button{
      border:0;border-radius:999px;padding:10px 14px;background:var(--accent);
      color:white;font-weight:700;cursor:pointer;
    }
    button.secondary{background:#111827}
    .card{
      background:rgba(255,255,255,.9);border:1px solid var(--line);
      border-radius:20px;padding:16px;margin:12px 0;box-shadow:0 8px 24px rgba(31,41,55,.06)
    }
    h2{font-size:18px;margin:0 0 10px}
    label{
      display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-top:1px solid #f1f3f5;
      line-height:1.35;
    }
    label:first-of-type{border-top:0}
    input[type="checkbox"]{width:20px;height:20px;accent-color:var(--accent);flex:0 0 auto}
    .done{text-decoration:line-through;color:var(--muted)}
    .progress{height:10px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin-top:12px}
    .bar{height:100%;width:0;background:var(--accent);transition:.2s}
    .small{font-size:13px;color:var(--muted);margin-top:8px}
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🇨🇳 China Trip Checklist</h1>
    <div class="sub">15–23 Jun 2026 · GstarSoft Innovation Summit + City Trip</div>
    <div class="progress"><div class="bar" id="bar"></div></div>
    <div class="small" id="count">0/0 checked</div>
    <div class="tools">
      <button onclick="window.print()">Print / Save PDF</button>
      <button class="secondary" onclick="resetAll()">Reset</button>
    </div>
  </header>

  <main id="list"></main>
</div>

<script>
const data = {
  "🛂 เอกสาร": ["Passport","Boarding Pass / E-ticket","Booking โรงแรม","ตั๋วรถไฟ Xi'an → Chengdu","ประกันเดินทาง (ถ้ามี)","เงินสด RMB","บัตรเครดิต / เดบิต","QR Payment / App จีน"],
  "💻 Work": ["MacBook","ที่ชาร์จ MacBook","Mouse","Adapter / Hub","USB Drive","สมุดโน้ต","ปากกา","Name Card"],
  "📱 Electronics": ["iPhone","สายชาร์จ iPhone","Apple Watch","สายชาร์จ Apple Watch","AirPods","Power Bank"],
  "👗 เสื้อผ้า": ["เชิ้ตโบว์","เสื้อ GstarCAD","เสื้อพอดีตัว สีขาว","เสื้อพอดีตัว สีดำ","เสื้อพอดีตัว สีอ่อน","เสื้อยืดเที่ยว","Skort ขาว","Skort ดำ","Skort ฟ้า","Skort น้ำตาลกาแฟ","Skort เทาเข้ม (ถ้าเอา)","กางเกงขายาวดำ","ยีนส์ 1 ตัว","Blazer สีกรม","Blazer สีขาวลายดำ","Blazer Uniqlo น้ำตาล","ชุดนอน","เสื้อชั้นใน","กางเกงชั้นใน","ถุงเท้า"],
  "👠 รองเท้า": ["รองเท้าส้นสูงสีขาว","รองเท้าผ้าใบ"],
  "👜 กระเป๋า": ["เป้ Laptop","Chamoon","Prada Re-Edition 2005 (ใส่ Luggage)","YSL Niki (ใส่ Luggage)"],
  "💍 Accessories": ["ต่างหู YSL","ต่างหูสำรอง","แหวน (ถ้าใส่)","Apple Watch"],
  "💄 Makeup": ["Cushion","Concealer","Powder","Eyebrow","Eyeshadow","Eyeliner","Mascara","Blush","Lip","Setting Spray"],
  "🧴 Skincare": ["Makeup Remover","Cleanser","Serum","Moisturizer","Sunscreen","Lip Balm"],
  "🚿 ของใช้ส่วนตัว": ["แปรงสีฟัน","ยาสีฟัน","หวี","ยางมัดผม","ผ้าอนามัย","ทิชชู่","ทิชชู่เปียก","เจลแอลกอฮอล์"],
  "💊 ยา": ["ยาพารา","ยาแก้แพ้","ยาแก้ท้องเสีย","ยาแก้เมารถ","พลาสเตอร์","ยาประจำตัว"],
  "🧳 กระเป๋าเดินทาง": ["ติด Luggage Tag","ถ่ายรูปกระเป๋าเก็บไว้","ใส่ข้อมูลติดต่อไว้ด้านในกระเป๋า"],
  "✈️ Check ก่อนออกจากบ้าน": ["Passport","Wallet","โทรศัพท์","MacBook","Power Bank","AirPods","เป้ Laptop","Chamoon","Luggage"]
};

const list = document.getElementById("list");
const saved = JSON.parse(localStorage.getItem("chinaChecklist") || "{}");

Object.entries(data).forEach(([section, items]) => {
  const card = document.createElement("section");
  card.className = "card";
  card.innerHTML = `<h2>${section}</h2>`;
  items.forEach(item => {
    const id = section + "::" + item;
    const label = document.createElement("label");
    label.innerHTML = `<input type="checkbox" ${saved[id] ? "checked" : ""}> <span>${item}</span>`;
    const cb = label.querySelector("input");
    const span = label.querySelector("span");
    if(cb.checked) span.classList.add("done");
    cb.addEventListener("change", () => {
      saved[id] = cb.checked;
      localStorage.setItem("chinaChecklist", JSON.stringify(saved));
      span.classList.toggle("done", cb.checked);
      updateProgress();
    });
    card.appendChild(label);
  });
  list.appendChild(card);
});

function updateProgress(){
  const boxes = [...document.querySelectorAll('input[type="checkbox"]')];
  const checked = boxes.filter(b=>b.checked).length;
  document.getElementById("bar").style.width = boxes.length ? (checked/boxes.length*100) + "%" : "0";
  document.getElementById("count").textContent = `${checked}/${boxes.length} checked`;
}
function resetAll(){
  if(confirm("Reset checklist ทั้งหมดไหม?")){
    localStorage.removeItem("chinaChecklist");
    location.reload();
  }
}
updateProgress();
</script>
</body>
</html>
